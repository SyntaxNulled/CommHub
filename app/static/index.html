<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CommHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-50 antialiased" x-data="app" x-init="init()">
    <div class="flex h-screen overflow-hidden">

        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col">
            <div class="p-5 border-b border-gray-200">
                <h1 class="text-xl font-bold text-gray-900 flex items-center gap-2">
                    <span>🔄</span> CommHub
                </h1>
                <p class="text-xs text-gray-400 mt-0.5" x-show="health" x-text="'v' + health.version"></p>
            </div>

            <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
                <template x-for="link in sidebarLinks" :key="link.id">
                    <a href="#"
                       class="sidebar-link"
                       :class="{ 'active': page === link.id }"
                       @click.prevent="navigate(link.id)"
                       x-text="link.icon + ' ' + link.label">
                    </a>
                </template>
            </nav>

            <div class="p-4 border-t border-gray-200">
                <div class="flex items-center gap-3 text-sm text-gray-500">
                    <span class="w-2 h-2 rounded-full"
                          :class="health ? 'bg-green-500' : 'bg-red-500'"></span>
                    <span x-text="health ? 'Connected' : 'Disconnected'"></span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col overflow-hidden">

            <!-- Top Bar -->
            <header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between">
                <h2 class="text-lg font-semibold text-gray-900" x-text="sidebarLinks.find(l => l.id === page)?.label || page"></h2>
                <div class="flex items-center gap-3">
                    <button class="px-4 py-1.5 bg-blue-600 text-white text-sm rounded-lg hover:bg-blue-700 transition-colors">
                        + Compose
                    </button>
                </div>
            </header>

            <!-- Content Area -->
            <div class="flex-1 overflow-y-auto bg-white">

                <!-- Loading -->
                <div x-show="loading" class="flex items-center justify-center h-full">
                    <div class="text-gray-400 text-sm">Loading...</div>
                </div>

                <!-- Inbox -->
                <div x-show="!loading && page === 'inbox'" class="divide-y divide-gray-100">
                    <div class="flex items-center gap-4 px-6 py-8 text-center text-gray-400 text-sm justify-center">
                        📬 No emails yet — add an account in Settings
                    </div>
                </div>

                <!-- Calendar -->
                <div x-show="!loading && page === 'calendar'" class="flex items-center justify-center h-full">
                    <div class="text-center text-gray-400">
                        <div class="text-4xl mb-3">📅</div>
                        <p class="text-sm">Calendar coming in Phase 5</p>
                    </div>
                </div>

                <!-- Settings -->
                <div x-show="!loading && page === 'settings'" class="p-6 max-w-2xl">
                    <h3 class="text-lg font-medium text-gray-900 mb-4">Connected Accounts</h3>
                    <div class="bg-gray-50 rounded-lg p-6 text-center text-gray-400 text-sm">
                        No accounts connected yet. OAuth setup coming in Phase 2.
                    </div>

                    <h3 class="text-lg font-medium text-gray-900 mt-8 mb-4">AI Provider</h3>
                    <div class="bg-gray-50 rounded-lg p-6 text-center text-gray-400 text-sm">
                        AI configuration coming in Phase 6.
                    </div>
                </div>

                <!-- Placeholder pages -->
                <div x-show="!loading && ['sent', 'drafts', 'starred'].includes(page)" class="flex items-center justify-center h-full">
                    <div class="text-center text-gray-400">
                        <p class="text-sm">Coming soon...</p>
                    </div>
                </div>

            </div>
        </main>
    </div>
</body>
</html>
