<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CommHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tailwind config MUST come after the CDN script — before it, `tailwind` is undefined and dark mode breaks -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Fira Sans', 'system-ui', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    },
                },
            },
        };
    </script>
    <link rel="stylesheet" href="/css/style.css">
    <script defer src="/js/app.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
</head>
<body class="bg-white dark:bg-gray-950 antialiased text-gray-900 dark:text-gray-100" x-data="app">
    <div class="flex h-screen overflow-hidden">

        <!-- Mobile sidebar backdrop -->
        <div x-cloak x-show="sidebarOpen" @click="sidebarOpen = false"
             class="fixed inset-0 bg-black/40 z-30 md:hidden" aria-hidden="true"></div>

        <!-- Sidebar -->
        <aside x-cloak
               :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'"
               class="fixed md:static inset-y-0 left-0 z-40 w-60 bg-gray-50 dark:bg-gray-900 border-r border-gray-200 dark:border-gray-800 flex flex-col shrink-0 transition-transform duration-200 md:transition-none"
               aria-label="Main navigation">
            <div class="px-4 py-4 border-b border-gray-200 dark:border-gray-800 flex items-center justify-between">
                <h1 class="text-lg font-bold flex items-center gap-2.5">
                    <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
                    CommHub
                </h1>
                <button @click="sidebarOpen = false" class="md:hidden p-1.5 rounded-lg text-gray-500 hover:bg-gray-200 dark:hover:bg-gray-800 cursor-pointer" aria-label="Close navigation">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>

            <nav class="flex-1 p-2 space-y-0.5 overflow-y-auto" aria-label="Folders">
                <template x-for="link in mailLinks" :key="link.id">
                    <button type="button"
                            class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors duration-150 cursor-pointer"
                            :class="page === link.id ? 'bg-blue-100 dark:bg-blue-900/40 text-blue-800 dark:text-blue-200 font-medium' : 'text-gray-600 dark:text-gray-400 hover:bg-gray-200/60 dark:hover:bg-gray-800 hover:text-gray-900 dark:hover:text-gray-200'"
                            :aria-current="page === link.id ? 'page' : null"
                            @click="navigate(link.id)">
                        <span class="shrink-0" x-html="iconSVG(link.icon)"></span>
                        <span x-text="link.label"></span>
                        <span x-show="link.id === 'inbox' && unreadTotal > 0"
                              class="ml-auto bg-blue-600 text-white text-xs font-semibold rounded-full px-2 py-0.5 min-w-[20px] text-center"
                              x-text="unreadTotal"
                              :aria-label="unreadTotal + ' unread emails'"></span>
                    </button>
                </template>
            </nav>

            <div class="border-t border-gray-200 dark:border-gray-800 pt-2 pb-2 px-2 space-y-0.5">
                <template x-for="link in toolLinks" :key="link.id">
                    <button type="button"
                            class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors duration-150 cursor-pointer"
                            :class="page === link.id ? 'bg-blue-100 dark:bg-blue-900/40 text-blue-800 dark:text-blue-200 font-medium' : 'text-gray-600 dark:text-gray-400 hover:bg-gray-200/60 dark:hover:bg-gray-800 hover:text-gray-900 dark:hover:text-gray-200'"
                            :aria-current="page === link.id ? 'page' : null"
                            @click="navigate(link.id)">
                        <span class="shrink-0" x-html="iconSVG(link.icon)"></span>
                        <span x-text="link.label"></span>
                    </button>
                </template>
            </div>

            <div class="p-3 border-t border-gray-200 dark:border-gray-800 flex items-center justify-between text-xs">
                <div class="flex items-center gap-2 text-gray-600 dark:text-gray-400">
                    <span class="w-2 h-2 rounded-full" :class="health ? 'bg-green-500' : 'bg-red-500'" aria-hidden="true"></span>
                    <span x-text="health ? 'Connected' : 'Offline'"></span>
                </div>
                <div class="flex items-center gap-0.5">
                    <button @click="shortcutsOpen = true"
                            class="text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 p-1.5 rounded-lg hover:bg-gray-200/60 dark:hover:bg-gray-800 transition-colors duration-150 cursor-pointer"
                            aria-label="Keyboard shortcuts">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093v0M12 17v.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    </button>
                    <button @click="toggleDarkMode"
                            class="text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 p-1.5 rounded-lg hover:bg-gray-200/60 dark:hover:bg-gray-800 transition-colors duration-150 cursor-pointer"
                            :aria-label="darkMode ? 'Switch to light mode' : 'Switch to dark mode'">
                        <svg x-show="darkMode" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                        <svg x-show="!darkMode" x-cloak class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main -->
        <main class="flex-1 flex flex-col overflow-hidden min-w-0">

            <!-- Top Bar -->
            <header class="bg-white dark:bg-gray-950 border-b border-gray-200 dark:border-gray-800 px-4 py-2.5 flex items-center justify-between shrink-0 gap-3">
                <div class="flex items-center gap-2 min-w-0">
                    <button @click="sidebarOpen = true" class="md:hidden p-1.5 -ml-1 rounded-lg text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 cursor-pointer" aria-label="Open navigation">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                    </button>
                    <h2 class="text-base font-semibold truncate" x-text="pageTitle"></h2>
                </div>
                <div class="flex items-center gap-2 shrink-0">
                    <button @click="aiPanelOpen = !aiPanelOpen"
                            class="px-3 py-1.5 border text-xs font-medium rounded-lg transition-colors duration-150 cursor-pointer"
                            :class="aiPanelOpen ? 'border-blue-500 text-blue-700 dark:text-blue-300 bg-blue-50 dark:bg-blue-900/30' : 'border-gray-300 dark:border-gray-700 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800'"
                            :aria-expanded="aiPanelOpen" aria-controls="ai-panel">
                        AI Assistant
                    </button>
                    <button x-show="isMailPage" @click="openCompose()"
                            class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-blue-600 text-white text-xs font-medium rounded-lg hover:bg-blue-700 transition-colors duration-150 cursor-pointer">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                        Compose
                    </button>
                </div>
            </header>

            <!-- Content -->
            <div class="flex-1 flex overflow-hidden">
                <div class="flex-1 flex flex-col overflow-hidden p-4 min-w-0">

                    <!-- ============ MAIL (inbox / sent / drafts / starred — one merged view) ============ -->
                    <template x-if="isMailPage">
                        <section class="flex flex-col h-full min-h-0" :aria-label="pageTitle">

                            <!-- Search + filter -->
                            <div class="flex items-center gap-2 mb-3 shrink-0">
                                <div class="relative flex-1">
                                    <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                                    <label for="mail-search" class="sr-only">Search all emails</label>
                                    <input id="mail-search" type="search" x-model="searchQuery" placeholder="Search all emails..."
                                           class="w-full pl-9 pr-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg text-sm bg-white dark:bg-gray-900 placeholder:text-gray-500 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/30 outline-none transition-colors duration-150">
                                </div>
                                <label for="mail-filter" class="sr-only">Filter emails</label>
                                <select id="mail-filter" x-model="searchFilter"
                                        class="px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg text-sm bg-white dark:bg-gray-900 cursor-pointer focus:border-blue-500 focus:ring-2 focus:ring-blue-500/30 outline-none">
                                    <option value="all">All</option>
                                    <option value="unread">Unread</option>
                                    <option value="read">Read</option>
                                    <option value="starred">Starred</option>
                                </select>
                                <span class="text-xs text-gray-600 dark:text-gray-400 shrink-0 hidden sm:block" x-text="totalEmails + ' emails'"></span>
                            </div>

                            <!-- Loading skeleton -->
                            <div x-show="emailsLoading && emails.length === 0" class="space-y-2" aria-hidden="true">
                                <template x-for="i in 6" :key="i">
                                    <div class="flex items-center gap-3 px-3 py-3">
                                        <div class="skeleton w-9 h-9 rounded-full shrink-0"></div>
                                        <div class="flex-1 space-y-2">
                                            <div class="skeleton h-3 rounded w-1/3"></div>
                                            <div class="skeleton h-3 rounded w-2/3"></div>
                                        </div>
                                    </div>
                                </template>
                            </div>

                            <!-- Empty state -->
                            <div x-show="!emailsLoading && emails.length === 0" class="flex flex-col items-center justify-center text-center py-16">
                                <svg class="w-16 h-16 text-gray-300 dark:text-gray-700 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/></svg>
                                <p class="text-lg text-gray-700 dark:text-gray-300 mb-1" x-text="searchQuery ? 'No results for &quot;' + searchQuery + '&quot;' : 'Nothing here yet'"></p>
                                <p class="text-sm text-gray-500 mb-6" x-show="page === 'inbox' && !searchQuery && accounts.length === 0">Load demo data to explore CommHub.</p>
                                <button x-show="page === 'inbox' && !searchQuery && accounts.length === 0" @click="seedData"
                                        class="inline-flex items-center gap-2 px-5 py-2.5 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors duration-150 cursor-pointer">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                                    Seed Demo Data
                                </button>
                            </div>

                            <!-- Split view: list + detail -->
                            <div x-show="emails.length > 0" class="flex gap-0 flex-1 min-h-0">

                                <!-- Email list -->
                                <div class="flex flex-col min-h-0"
                                     :class="selectedEmail ? 'hidden lg:flex lg:w-2/5 lg:shrink-0 lg:border-r lg:border-gray-200 dark:lg:border-gray-800 lg:pr-3' : 'w-full'">
                                    <ul class="flex-1 overflow-y-auto divide-y divide-gray-100 dark:divide-gray-800/80" role="list">
                                        <template x-for="email in filteredEmails" :key="email.id">
                                            <li>
                                                <div role="button" tabindex="0"
                                                     @click="selectEmail(email)"
                                                     @keydown.enter="selectEmail(email)"
                                                     @keydown.space.prevent="selectEmail(email)"
                                                     class="flex items-start gap-3 px-3 py-3 cursor-pointer transition-colors duration-150 border-l-2 rounded-r-lg"
                                                     :class="[
                                                        email.is_read ? 'border-l-transparent' : 'border-l-blue-500 bg-blue-50/50 dark:bg-blue-900/15',
                                                        selectedEmail?.id === email.id ? 'bg-blue-100/70 dark:bg-blue-900/30' : 'hover:bg-gray-50 dark:hover:bg-gray-900'
                                                     ]"
                                                     :aria-label="'Email from ' + (email.from_name || email.from_address) + ': ' + email.subject">
                                                    <span class="shrink-0 w-9 h-9 rounded-full flex items-center justify-center text-white text-xs font-semibold select-none"
                                                          :class="avatarColor(email.from_address)"
                                                          x-text="initials(email.from_name || email.from_address)" aria-hidden="true"></span>
                                                    <div class="flex-1 min-w-0">
                                                        <div class="flex items-baseline justify-between gap-2">
                                                            <span class="text-sm truncate"
                                                                  :class="email.is_read ? 'text-gray-600 dark:text-gray-400 font-normal' : 'text-gray-900 dark:text-gray-100 font-semibold'"
                                                                  x-text="email.from_name || email.from_address"></span>
                                                            <span class="text-xs text-gray-500 shrink-0" x-text="formatDate(email.received_at)"></span>
                                                        </div>
                                                        <div class="text-sm truncate"
                                                             :class="email.is_read ? 'text-gray-600 dark:text-gray-400' : 'text-gray-900 dark:text-gray-200 font-medium'"
                                                             x-text="email.subject"></div>
                                                        <div class="text-xs text-gray-500 truncate" x-text="truncate(email.body_text, 90)"></div>
                                                    </div>
                                                    <button @click.stop="toggleStar(email)"
                                                            class="shrink-0 mt-1 p-1 rounded cursor-pointer transition-colors duration-150"
                                                            :class="email.is_starred ? 'text-amber-400 hover:text-amber-500' : 'text-gray-300 dark:text-gray-600 hover:text-amber-400'"
                                                            :aria-label="email.is_starred ? 'Unstar email' : 'Star email'"
                                                            :aria-pressed="email.is_starred">
                                                        <svg class="w-4 h-4" :fill="email.is_starred ? 'currentColor' : 'none'" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                                                    </button>
                                                </div>
                                            </li>
                                        </template>
                                    </ul>

                                    <!-- Pagination -->
                                    <nav x-show="totalPages > 1" class="shrink-0 flex items-center justify-between px-3 py-2 border-t border-gray-200 dark:border-gray-800 text-xs text-gray-600 dark:text-gray-400" aria-label="Email pages">
                                        <button @click="prevPage()" :disabled="currentPage === 1"
                                                class="px-2.5 py-1.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 disabled:opacity-40 disabled:cursor-not-allowed transition-colors duration-150 cursor-pointer">
                                            &larr; Prev
                                        </button>
                                        <span x-text="'Page ' + currentPage + ' of ' + totalPages" aria-live="polite"></span>
                                        <button @click="nextPage()" :disabled="currentPage === totalPages"
                                                class="px-2.5 py-1.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 disabled:opacity-40 disabled:cursor-not-allowed transition-colors duration-150 cursor-pointer">
                                            Next &rarr;
                                        </button>
                                    </nav>
                                </div>

                                <!-- Email detail (x-if removes it from the DOM when nothing selected — no null binding errors) -->
                                <template x-if="selectedEmail">
                                    <article class="flex-1 overflow-y-auto min-w-0 lg:pl-4" aria-label="Email detail">
                                        <div class="flex items-center justify-between mb-4">
                                            <button @click="closeEmailDetail"
                                                    class="text-sm text-blue-700 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-300 inline-flex items-center gap-1 cursor-pointer transition-colors duration-150">
                                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                                                Back
                                            </button>
                                            <div class="flex gap-1">
                                                <button @click="toggleStar(selectedEmail)"
                                                        class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 cursor-pointer transition-colors duration-150"
                                                        :class="selectedEmail.is_starred ? 'text-amber-400' : 'text-gray-500'"
                                                        :aria-label="selectedEmail.is_starred ? 'Unstar email' : 'Star email'"
                                                        :aria-pressed="selectedEmail.is_starred">
                                                    <svg class="w-4 h-4" :fill="selectedEmail.is_starred ? 'currentColor' : 'none'" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                                                </button>
                                                <button @click="requestDelete('email', selectedEmail.id, selectedEmail.subject)"
                                                        class="p-2 rounded-lg text-gray-500 hover:text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 cursor-pointer transition-colors duration-150"
                                                        aria-label="Delete email">
                                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                                </button>
                                            </div>
                                        </div>

                                        <h3 class="text-xl font-semibold mb-3" x-text="selectedEmail.subject"></h3>
                                        <div class="flex items-center gap-3 mb-4 pb-4 border-b border-gray-100 dark:border-gray-800">
                                            <span class="shrink-0 w-10 h-10 rounded-full flex items-center justify-center text-white text-sm font-semibold select-none"
                                                  :class="avatarColor(selectedEmail.from_address)"
                                                  x-text="initials(selectedEmail.from_name || selectedEmail.from_address)" aria-hidden="true"></span>
                                            <div class="text-sm min-w-0">
                                                <div class="font-medium text-gray-900 dark:text-gray-100">
                                                    <span x-text="selectedEmail.from_name || selectedEmail.from_address"></span>
                                                    <span class="text-gray-500 font-normal" x-show="selectedEmail.from_name" x-text="'<' + selectedEmail.from_address + '>'"></span>
                                                </div>
                                                <div class="text-gray-600 dark:text-gray-400">
                                                    To: <span x-text="selectedEmail.to_addresses"></span>
                                                    · <span x-text="new Date(selectedEmail.received_at).toLocaleString()"></span>
                                                </div>
                                            </div>
                                        </div>

                                        <div class="text-sm text-gray-800 dark:text-gray-200 whitespace-pre-wrap leading-relaxed" x-text="selectedEmail.body_text"></div>

                                        <div class="mt-6 pt-4 border-t border-gray-100 dark:border-gray-800 flex gap-2">
                                            <button @click="replyToSelected()"
                                                    class="inline-flex items-center gap-1.5 text-sm font-medium px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors duration-150 cursor-pointer">
                                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/></svg>
                                                Reply
                                            </button>
                                            <button @click="aiInput = selectedEmail.body_text; aiPanelOpen = true"
                                                    class="inline-flex items-center gap-1.5 text-sm font-medium px-4 py-2 border border-gray-300 dark:border-gray-700 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors duration-150 cursor-pointer">
                                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
                                                Ask AI
                                            </button>
                                        </div>
                                    </article>
                                </template>
                            </div>
                        </section>
                    </template>

                    <!-- ============ CALENDAR ============ -->
                    <template x-if="page === 'calendar'">
                        <section class="flex flex-col h-full min-h-0" aria-label="Calendar">
                            <div class="flex items-center justify-between mb-4 shrink-0 flex-wrap gap-2">
                                <h3 class="text-base font-semibold" x-text="calendarWeekLabel()"></h3>
                                <div class="flex items-center gap-1">
                                    <button @click="calendarPrevWeek()" class="p-2 rounded-lg text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 cursor-pointer transition-colors duration-150" aria-label="Previous week">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                                    </button>
                                    <button @click="calendarToday()" class="px-3 py-1.5 text-xs font-medium rounded-lg border border-gray-300 dark:border-gray-700 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 cursor-pointer transition-colors duration-150">Today</button>
                                    <button @click="calendarNextWeek()" class="p-2 rounded-lg text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 cursor-pointer transition-colors duration-150" aria-label="Next week">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                                    </button>
                                    <span class="text-xs text-gray-600 dark:text-gray-400 ml-2" x-text="events.length + ' events'"></span>
                                </div>
                            </div>
                            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-7 gap-px bg-gray-200 dark:bg-gray-800 rounded-lg overflow-hidden overflow-y-auto">
                                <template x-for="(day, idx) in calendarDays" :key="idx">
                                    <div class="bg-white dark:bg-gray-900 min-h-[110px] p-2"
                                         :class="isToday(day.date) ? 'bg-blue-50 dark:bg-blue-900/20' : ''">
                                        <div class="flex items-center justify-between mb-1.5">
                                            <span class="text-xs font-medium text-gray-600 dark:text-gray-400" x-text="dayName(day.date)"></span>
                                            <span class="text-xs font-semibold"
                                                  :class="isToday(day.date) ? 'bg-blue-600 text-white w-6 h-6 rounded-full flex items-center justify-center' : 'text-gray-700 dark:text-gray-300'"
                                                  x-text="dayNum(day.date)"></span>
                                        </div>
                                        <div class="space-y-1">
                                            <template x-for="evt in day.events" :key="evt.id">
                                                <button @click="editEvent(evt)"
                                                        class="block w-full text-left text-xs px-1.5 py-1 rounded bg-blue-100 dark:bg-blue-900/40 text-blue-900 dark:text-blue-200 truncate cursor-pointer hover:bg-blue-200 dark:hover:bg-blue-900/60 transition-colors duration-150"
                                                        x-text="evt.title"></button>
                                            </template>
                                            <button @click="openNewEvent(day)"
                                                    class="w-full text-left text-xs text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 px-1.5 py-1 rounded hover:bg-blue-50 dark:hover:bg-blue-900/20 cursor-pointer transition-colors duration-150"
                                                    :aria-label="'Add event on ' + day.date.toLocaleDateString()">
                                                + Add
                                            </button>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </section>
                    </template>

                    <!-- ============ AUTOMATION ============ -->
                    <template x-if="page === 'automation'">
                        <section class="max-w-2xl overflow-y-auto" aria-label="Automation rules">
                            <div class="flex items-center justify-between mb-4">
                                <h3 class="text-lg font-semibold">Automation Rules</h3>
                                <button @click="openNewRule()" class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors duration-150 cursor-pointer">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                                    New Rule
                                </button>
                            </div>

                            <ul class="space-y-2 mb-6" role="list">
                                <template x-for="rule in automationRules" :key="rule.id">
                                    <li class="border border-gray-200 dark:border-gray-800 rounded-lg p-3 bg-white dark:bg-gray-900">
                                        <div class="flex items-start justify-between gap-2">
                                            <div class="min-w-0">
                                                <div class="flex items-center gap-2 flex-wrap">
                                                    <span class="font-medium text-sm" x-text="rule.name"></span>
                                                    <span class="text-xs px-2 py-0.5 rounded-full font-medium"
                                                          :class="rule.is_enabled ? 'bg-green-100 dark:bg-green-900/40 text-green-800 dark:text-green-300' : 'bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400'"
                                                          x-text="rule.is_enabled ? 'Active' : 'Disabled'"></span>
                                                </div>
                                                <div class="text-xs text-gray-600 dark:text-gray-400 mt-1 flex items-center gap-1.5 flex-wrap">
                                                    <span x-text="triggerTypeLabel(rule.trigger_type)"></span>
                                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
                                                    <span x-text="actionTypeLabel(rule.action_type)"></span>
                                                    <span x-show="rule.cron_schedule" class="font-mono text-gray-500" x-text="rule.cron_schedule"></span>
                                                </div>
                                            </div>
                                            <div class="flex gap-1 shrink-0">
                                                <button @click="toggleRule(rule.id)"
                                                        class="px-2 py-1 text-xs rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 cursor-pointer transition-colors duration-150"
                                                        :class="rule.is_enabled ? 'text-amber-700 dark:text-amber-400' : 'text-green-700 dark:text-green-400'"
                                                        x-text="rule.is_enabled ? 'Disable' : 'Enable'"></button>
                                                <button @click="editRule(rule)" class="px-2 py-1 text-xs text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-200 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 cursor-pointer transition-colors duration-150">Edit</button>
                                                <button @click="requestDelete('rule', rule.id, rule.name)" class="px-2 py-1 text-xs text-red-600 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 cursor-pointer transition-colors duration-150">Delete</button>
                                            </div>
                                        </div>
                                    </li>
                                </template>
                            </ul>
                            <p x-show="automationRules.length === 0" class="text-sm text-gray-500 py-8 text-center">No automation rules yet. Create one to auto-reply, categorize, or star incoming email.</p>

                            <!-- Rule form -->
                            <div x-show="ruleFormOpen" class="border border-gray-200 dark:border-gray-800 rounded-lg p-4 bg-gray-50 dark:bg-gray-900 mb-6">
                                <h4 class="font-medium text-sm mb-3" x-text="ruleFormEdit ? 'Edit Rule' : 'New Rule'"></h4>
                                <div class="space-y-3">
                                    <div>
                                        <label for="rule-name" class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">Rule name</label>
                                        <input id="rule-name" type="text" x-model="ruleForm.name"
                                               class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg text-sm bg-white dark:bg-gray-800 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/30 outline-none">
                                    </div>
                                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                        <div>
                                            <label for="rule-trigger" class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">When (trigger)</label>
                                            <select id="rule-trigger" x-model="ruleForm.trigger_type" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg text-sm bg-white dark:bg-gray-800 cursor-pointer">
                                                <template x-for="t in triggerTypes" :key="t"><option :value="t" x-text="triggerTypeLabel(t)"></option></template>
                                            </select>
                                        </div>
                                        <div>
                                            <label for="rule-action" class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">Then (action)</label>
                                            <select id="rule-action" x-model="ruleForm.action_type" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg text-sm bg-white dark:bg-gray-800 cursor-pointer">
                                                <template x-for="a in actionTypes" :key="a"><option :value="a" x-text="actionTypeLabel(a)"></option></template>
                                            </select>
                                        </div>
                                    </div>
                                    <div x-show="ruleForm.trigger_type === 'cron_schedule'">
                                        <label for="rule-cron" class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">Cron schedule <span class="text-gray-500 font-normal">(e.g. */5 * * * * = every 5 min)</span></label>
                                        <input id="rule-cron" type="text" x-model="ruleForm.cron_schedule" placeholder="*/5 * * * *"
                                               class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg text-sm font-mono bg-white dark:bg-gray-800 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/30 outline-none">
                                    </div>
                                    <div x-show="ruleForm.action_type === 'auto_reply'">
                                        <label for="rule-reply" class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">Auto-reply message</label>
                                        <textarea id="rule-reply" x-model="ruleForm.action_config.body" rows="2"
                                                  class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg text-sm bg-white dark:bg-gray-800 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/30 outline-none"></textarea>
                                    </div>
                                    <div x-show="ruleForm.action_type === 'forward'">
                                        <label for="rule-forward" class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">Forward to</label>
                                        <input id="rule-forward" type="email" x-model="ruleForm.action_config.to" placeholder="forward@example.com"
                                               class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg text-sm bg-white dark:bg-gray-800 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/30 outline-none">
                                    </div>
                                    <div class="flex gap-2 pt-1">
                                        <button @click="saveRule()" :disabled="ruleFormSaving"
                                                class="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 disabled:opacity-60 disabled:cursor-not-allowed transition-colors duration-150 cursor-pointer"
                                                x-text="ruleFormSaving ? 'Saving...' : 'Save Rule'"></button>
                                        <button @click="closeRuleForm()" class="px-4 py-2 border border-gray-300 dark:border-gray-700 text-gray-700 dark:text-gray-300 text-sm rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors duration-150 cursor-pointer">Cancel</button>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </template>

                    <!-- ============ SETTINGS ============ -->
                    <template x-if="page === 'settings'">
                        <section class="max-w-2xl overflow-y-auto" aria-label="Settings">
                            <h3 class="text-lg font-semibold mb-4">Settings</h3>

                            <div class="border border-gray-200 dark:border-gray-800 rounded-lg p-5 mb-6 bg-white dark:bg-gray-900">
                                <h4 class="font-medium mb-1">Demo Data</h4>
                                <p class="text-sm text-gray-600 dark:text-gray-400 mb-4">Populate CommHub with sample emails and calendar events while real account integration is pending.</p>
                                <button @click="seedData" class="inline-flex items-center gap-2 px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors duration-150 cursor-pointer">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                                    Seed Demo Data
                                </button>
                            </div>

                            <div class="border border-gray-200 dark:border-gray-800 rounded-lg p-5 mb-6 bg-white dark:bg-gray-900">
                                <h4 class="font-medium mb-3">Connected Accounts</h4>
                                <template x-if="accounts.length === 0">
                                    <p class="text-sm text-gray-500">No accounts connected yet. OAuth setup is on hold until credentials are available.</p>
                                </template>
                                <ul class="space-y-2" role="list">
                                    <template x-for="acct in accounts" :key="acct.id">
                                        <li class="flex items-center gap-3 text-sm">
                                            <span class="shrink-0 w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-semibold" :class="avatarColor(acct.email)" x-text="initials(acct.display_name || acct.email)" aria-hidden="true"></span>
                                            <div>
                                                <div class="font-medium" x-text="acct.email"></div>
                                                <div class="text-xs text-gray-500 capitalize" x-text="acct.provider + (acct.display_name ? ' · ' + acct.display_name : '')"></div>
                                            </div>
                                        </li>
                                    </template>
                                </ul>
                            </div>

                            <div class="border border-gray-200 dark:border-gray-800 rounded-lg p-5 bg-white dark:bg-gray-900">
                                <div class="flex items-center justify-between mb-3">
                                    <h4 class="font-medium">AI Providers</h4>
                                    <span class="text-xs text-gray-500" x-text="aiActiveLabel ? 'Active: ' + aiActiveLabel : 'None active'"></span>
                                </div>
                                <ul class="space-y-2 mb-4" role="list">
                                    <template x-for="cfg in aiConfigs" :key="cfg.provider_type">
                                        <li class="border border-gray-200 dark:border-gray-800 rounded-lg p-3 flex items-center justify-between gap-2"
                                            :class="{ 'ring-2 ring-blue-500': cfg.is_active }">
                                            <div class="min-w-0">
                                                <div class="text-sm font-medium" x-text="cfg.display_name"></div>
                                                <div class="text-xs text-gray-600 dark:text-gray-400">
                                                    <span x-text="cfg.provider_type"></span> · <span x-text="cfg.model || 'default model'"></span>
                                                    <span x-show="cfg.has_api_key" class="font-mono" x-text="' · ' + cfg.api_key_masked"></span>
                                                    <span x-show="cfg.is_active" class="ml-1 text-blue-700 dark:text-blue-400 font-medium">Active</span>
                                                </div>
                                            </div>
                                            <div class="flex gap-1 shrink-0">
                                                <button @click="editAiConfig(cfg)" class="text-xs text-gray-600 dark:text-gray-400 px-2 py-1 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 cursor-pointer transition-colors duration-150">Edit</button>
                                                <button x-show="!cfg.is_active" @click="activateAiProvider(cfg.provider_type)" class="text-xs text-blue-700 dark:text-blue-400 px-2 py-1 rounded-lg hover:bg-blue-50 dark:hover:bg-blue-900/20 cursor-pointer transition-colors duration-150">Activate</button>
                                                <button @click="requestDelete('aiConfig', cfg.provider_type, cfg.display_name)" class="text-xs text-red-600 px-2 py-1 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 cursor-pointer transition-colors duration-150">Delete</button>
                                            </div>
                                        </li>
                                    </template>
                                </ul>
                                <p x-show="aiConfigs.length === 0" class="text-sm text-gray-500 mb-4">No AI providers configured.</p>

                                <div x-show="unconfiguredProviders.length > 0" class="flex flex-wrap gap-2 mb-4">
                                    <template x-for="p in unconfiguredProviders" :key="p">
                                        <button @click="openNewAiConfig(p)"
                                                class="px-3 py-1.5 border border-dashed border-gray-300 dark:border-gray-700 text-xs text-gray-600 dark:text-gray-400 rounded-lg hover:border-blue-500 hover:text-blue-700 dark:hover:text-blue-400 cursor-pointer transition-colors duration-150">
                                            + <span x-text="p"></span>
                                        </button>
                                    </template>
                                </div>

                                <!-- AI config form -->
                                <div x-show="aiFormOpen" class="border border-gray-200 dark:border-gray-800 rounded-lg p-4 bg-gray-50 dark:bg-gray-950/50">
                                    <h5 class="text-sm font-medium mb-3" x-text="(aiFormEdit ? 'Edit ' : 'Add ') + aiForm.provider_type"></h5>
                                    <div class="space-y-3 max-w-sm">
                                        <div>
                                            <label for="ai-name" class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">Display name</label>
                                            <input id="ai-name" type="text" x-model="aiForm.display_name" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg text-sm bg-white dark:bg-gray-800 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/30 outline-none">
                                        </div>
                                        <div>
                                            <label for="ai-key" class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">
                                                API key <span x-show="aiFormEdit" class="text-gray-500 font-normal">(leave blank to keep current)</span>
                                            </label>
                                            <input id="ai-key" type="password" x-model="aiForm.api_key" autocomplete="off" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg text-sm bg-white dark:bg-gray-800 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/30 outline-none">
                                        </div>
                                        <div>
                                            <label for="ai-url" class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">Base URL <span class="text-gray-500 font-normal">(optional)</span></label>
                                            <input id="ai-url" type="text" x-model="aiForm.base_url" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg text-sm bg-white dark:bg-gray-800 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/30 outline-none">
                                        </div>
                                        <div class="grid grid-cols-2 gap-3">
                                            <div>
                                                <label for="ai-model" class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">Model</label>
                                                <input id="ai-model" type="text" x-model="aiForm.model" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg text-sm bg-white dark:bg-gray-800 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/30 outline-none">
                                            </div>
                                            <div>
                                                <label for="ai-temp" class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">Temperature</label>
                                                <input id="ai-temp" type="number" step="0.1" min="0" max="2" x-model.number="aiForm.temperature" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg text-sm bg-white dark:bg-gray-800 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/30 outline-none">
                                            </div>
                                        </div>
                                        <div class="flex gap-2 pt-1">
                                            <button @click="saveAiConfig()" :disabled="aiFormSaving"
                                                    class="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 disabled:opacity-60 disabled:cursor-not-allowed transition-colors duration-150 cursor-pointer"
                                                    x-text="aiFormSaving ? 'Saving...' : 'Save'"></button>
                                            <button @click="closeAiForm()" class="px-4 py-2 border border-gray-300 dark:border-gray-700 text-gray-700 dark:text-gray-300 text-sm rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors duration-150 cursor-pointer">Cancel</button>
                                        </div>
                                        <p x-show="aiFormError" class="text-xs text-red-600" role="alert" x-text="aiFormError"></p>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </template>

                </div>

                <!-- AI Assistant Panel -->
                <div x-cloak x-show="aiPanelOpen" id="ai-panel"
                     class="w-full sm:w-80 fixed sm:static inset-0 sm:inset-auto z-40 sm:z-auto border-l border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 flex flex-col overflow-hidden shrink-0"
                     role="complementary" aria-label="AI Assistant">
                    <div class="px-3 py-2.5 border-b border-gray-200 dark:border-gray-800 flex items-center justify-between shrink-0">
                        <h3 class="text-sm font-medium inline-flex items-center gap-2">
                            <svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
                            AI Assistant
                        </h3>
                        <button @click="aiPanelOpen = false" class="text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 p-1.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 cursor-pointer transition-colors duration-150" aria-label="Close AI assistant">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                        </button>
                    </div>
                    <div class="flex-1 overflow-y-auto p-3 space-y-3">
                        <div>
                            <label for="ai-input" class="sr-only">Text for the AI to work with</label>
                            <textarea id="ai-input" x-model="aiInput" rows="5"
                                      class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg text-sm resize-none bg-white dark:bg-gray-800 placeholder:text-gray-500 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/30 outline-none"
                                      placeholder="Paste email text or type a prompt..."></textarea>
                        </div>
                        <div>
                            <label for="ai-tone" class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">Draft tone</label>
                            <select id="ai-tone" x-model="aiTone" class="w-full px-2 py-1.5 border border-gray-300 dark:border-gray-700 rounded-lg text-xs bg-white dark:bg-gray-800 cursor-pointer">
                                <option value="professional">Professional</option>
                                <option value="friendly">Friendly</option>
                                <option value="formal">Formal</option>
                                <option value="casual">Casual</option>
                            </select>
                        </div>
                        <div class="flex flex-wrap gap-1.5" role="group" aria-label="AI actions">
                            <button @click="aiAction('draft')" :disabled="aiLoading" class="px-2.5 py-1.5 bg-blue-600 text-white text-xs font-medium rounded-lg hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors duration-150 cursor-pointer">Draft Reply</button>
                            <button @click="aiAction('summarize')" :disabled="aiLoading" class="px-2.5 py-1.5 border border-gray-300 dark:border-gray-700 text-gray-700 dark:text-gray-300 text-xs font-medium rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 disabled:opacity-50 disabled:cursor-not-allowed transition-colors duration-150 cursor-pointer">Summarize</button>
                            <button @click="aiAction('categorize')" :disabled="aiLoading" class="px-2.5 py-1.5 border border-gray-300 dark:border-gray-700 text-gray-700 dark:text-gray-300 text-xs font-medium rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 disabled:opacity-50 disabled:cursor-not-allowed transition-colors duration-150 cursor-pointer">Categorize</button>
                            <button @click="aiAction('chat')" :disabled="aiLoading" class="px-2.5 py-1.5 border border-gray-300 dark:border-gray-700 text-gray-700 dark:text-gray-300 text-xs font-medium rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 disabled:opacity-50 disabled:cursor-not-allowed transition-colors duration-150 cursor-pointer">Chat</button>
                        </div>

                        <div x-show="aiLoading" class="flex items-center justify-center gap-2 text-xs text-gray-500 py-3" aria-live="polite">
                            <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24" aria-hidden="true"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                            Thinking...
                        </div>

                        <div x-show="aiResult" class="bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg p-3">
                            <div class="text-xs text-gray-500 mb-1" x-text="'via ' + aiResultProvider"></div>
                            <div class="text-sm whitespace-pre-wrap" x-text="aiResult"></div>
                            <button @click="copyAiResult()" class="mt-2 text-xs font-medium text-blue-700 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-300 cursor-pointer transition-colors duration-150"
                                    x-text="aiCopied ? 'Copied!' : 'Copy to clipboard'"></button>
                        </div>
                        <p x-show="aiError" class="bg-red-50 dark:bg-red-900/20 text-red-700 dark:text-red-400 text-xs rounded-lg p-2.5" role="alert" x-text="aiError"></p>
                    </div>
                </div>
            </div>
        </main>

        <!-- ============ Compose Modal ============ -->
        <div x-cloak x-show="composeOpen" class="fixed inset-0 bg-black/40 dark:bg-black/60 z-50 flex items-center justify-center p-4"
             @click.self="closeCompose()" role="dialog" aria-modal="true" aria-labelledby="compose-title">
            <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-xl w-[560px] max-w-full max-h-[85vh] overflow-y-auto p-5">
                <div class="flex items-center justify-between mb-4">
                    <h3 id="compose-title" class="font-semibold">New Message</h3>
                    <button @click="closeCompose()" class="text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 p-1.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 cursor-pointer transition-colors duration-150" aria-label="Close compose window">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
                <div class="space-y-3">
                    <div>
                        <label for="compose-from" class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">From</label>
                        <select id="compose-from" x-model.number="composeForm.account_id" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg text-sm bg-white dark:bg-gray-800 cursor-pointer">
                            <template x-for="a in accountOptions" :key="a.value"><option :value="a.value" x-text="a.label"></option></template>
                        </select>
                    </div>
                    <div>
                        <label for="compose-to" class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">To</label>
                        <input id="compose-to" type="email" x-model="composeForm.to" placeholder="recipient@example.com"
                               class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg text-sm bg-white dark:bg-gray-800 placeholder:text-gray-500 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/30 outline-none">
                    </div>
                    <div>
                        <label for="compose-subject" class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">Subject</label>
                        <input id="compose-subject" type="text" x-model="composeForm.subject"
                               class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg text-sm bg-white dark:bg-gray-800 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/30 outline-none">
                    </div>
                    <div>
                        <label for="compose-body" class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">Message</label>
                        <textarea id="compose-body" x-model="composeForm.body" rows="8"
                                  class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg text-sm resize-none bg-white dark:bg-gray-800 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/30 outline-none"></textarea>
                    </div>
                    <div class="flex gap-2 pt-1">
                        <button @click="sendEmail()" :disabled="sending"
                                class="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 disabled:opacity-60 disabled:cursor-not-allowed transition-colors duration-150 cursor-pointer"
                                x-text="sending ? 'Sending...' : 'Send'"></button>
                        <button @click="saveDraft()" :disabled="sending"
                                class="px-4 py-2 border border-gray-300 dark:border-gray-700 text-gray-700 dark:text-gray-300 text-sm rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 disabled:opacity-60 transition-colors duration-150 cursor-pointer">Save Draft</button>
                        <button @click="closeCompose()" class="px-4 py-2 text-gray-600 dark:text-gray-400 text-sm rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 ml-auto transition-colors duration-150 cursor-pointer">Discard</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ============ Event Modal ============ -->
        <div x-cloak x-show="eventFormOpen" class="fixed inset-0 bg-black/40 dark:bg-black/60 z-50 flex items-center justify-center p-4"
             @click.self="closeEventForm()" role="dialog" aria-modal="true" aria-labelledby="event-form-title">
            <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-xl w-96 max-w-full max-h-[85vh] overflow-y-auto p-5">
                <h4 id="event-form-title" class="font-semibold mb-4" x-text="editingEventId ? 'Edit Event' : 'New Event'"></h4>
                <div class="space-y-3">
                    <div>
                        <label for="event-title" class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">Title</label>
                        <input id="event-title" type="text" x-model="eventForm.title"
                               class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg text-sm bg-white dark:bg-gray-800 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/30 outline-none">
                    </div>
                    <div>
                        <label for="event-desc" class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">Description <span class="text-gray-500 font-normal">(optional)</span></label>
                        <textarea id="event-desc" x-model="eventForm.description" rows="2"
                                  class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg text-sm bg-white dark:bg-gray-800 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/30 outline-none"></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label for="event-start" class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">Start</label>
                            <input id="event-start" type="datetime-local" x-model="eventForm.start_time"
                                   class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg text-sm bg-white dark:bg-gray-800">
                        </div>
                        <div>
                            <label for="event-end" class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">End</label>
                            <input id="event-end" type="datetime-local" x-model="eventForm.end_time"
                                   class="w-full px-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg text-sm bg-white dark:bg-gray-800">
                        </div>
                    </div>
                    <div class="flex gap-2 pt-2">
                        <button @click="saveEvent()" class="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors duration-150 cursor-pointer">Save</button>
                        <button @click="closeEventForm()" class="px-4 py-2 border border-gray-300 dark:border-gray-700 text-gray-700 dark:text-gray-300 text-sm rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors duration-150 cursor-pointer">Cancel</button>
                        <button x-show="editingEventId" @click="requestDelete('event', editingEventId, eventForm.title)"
                                class="px-4 py-2 text-red-600 text-sm rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 ml-auto transition-colors duration-150 cursor-pointer">Delete</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ============ Confirm Delete Dialog ============ -->
        <div x-cloak x-show="confirmDelete" class="fixed inset-0 bg-black/40 dark:bg-black/60 z-[60] flex items-center justify-center p-4"
             @click.self="confirmDelete = null" role="alertdialog" aria-modal="true" aria-labelledby="confirm-title">
            <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-xl w-96 max-w-full p-5">
                <h4 id="confirm-title" class="font-semibold mb-2">Delete this?</h4>
                <p class="text-sm text-gray-600 dark:text-gray-400 mb-4">
                    <span class="font-medium text-gray-900 dark:text-gray-100" x-text="confirmDelete?.label"></span>
                    will be permanently deleted. This can't be undone.
                </p>
                <div class="flex gap-2 justify-end">
                    <button @click="confirmDelete = null" class="px-4 py-2 border border-gray-300 dark:border-gray-700 text-gray-700 dark:text-gray-300 text-sm rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors duration-150 cursor-pointer">Cancel</button>
                    <button @click="executeDelete()" class="px-4 py-2 bg-red-600 text-white text-sm font-medium rounded-lg hover:bg-red-700 transition-colors duration-150 cursor-pointer">Delete</button>
                </div>
            </div>
        </div>

        <!-- ============ Keyboard Shortcuts Modal ============ -->
        <div x-cloak x-show="shortcutsOpen" class="fixed inset-0 bg-black/40 dark:bg-black/60 z-50 flex items-center justify-center p-4"
             @click.self="shortcutsOpen = false" role="dialog" aria-modal="true" aria-labelledby="shortcuts-title">
            <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-xl w-80 max-w-full p-5">
                <div class="flex items-center justify-between mb-4">
                    <h3 id="shortcuts-title" class="font-semibold">Keyboard Shortcuts</h3>
                    <button @click="shortcutsOpen = false" class="text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 p-1.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 cursor-pointer transition-colors duration-150" aria-label="Close shortcuts help">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
                <dl class="space-y-2.5 text-sm">
                    <div class="flex items-center justify-between"><dt class="text-gray-600 dark:text-gray-400">Next / previous email</dt><dd class="flex gap-1"><kbd class="px-2 py-0.5 text-xs bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded">j</kbd><kbd class="px-2 py-0.5 text-xs bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded">k</kbd></dd></div>
                    <div class="flex items-center justify-between"><dt class="text-gray-600 dark:text-gray-400">Reply</dt><dd><kbd class="px-2 py-0.5 text-xs bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded">r</kbd></dd></div>
                    <div class="flex items-center justify-between"><dt class="text-gray-600 dark:text-gray-400">Compose</dt><dd><kbd class="px-2 py-0.5 text-xs bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded">c</kbd></dd></div>
                    <div class="flex items-center justify-between"><dt class="text-gray-600 dark:text-gray-400">Search</dt><dd><kbd class="px-2 py-0.5 text-xs bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded">/</kbd></dd></div>
                    <div class="flex items-center justify-between"><dt class="text-gray-600 dark:text-gray-400">Close / back</dt><dd><kbd class="px-2 py-0.5 text-xs bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded">Esc</kbd></dd></div>
                    <div class="flex items-center justify-between"><dt class="text-gray-600 dark:text-gray-400">This help</dt><dd><kbd class="px-2 py-0.5 text-xs bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded">?</kbd></dd></div>
                </dl>
            </div>
        </div>

        <!-- ============ Toasts ============ -->
        <div x-cloak class="fixed bottom-4 right-4 z-[70] space-y-2 w-80 max-w-[calc(100vw-2rem)]" aria-live="polite" aria-atomic="false">
            <template x-for="t in toasts" :key="t.id">
                <div class="toast-enter flex items-start gap-2.5 px-4 py-3 rounded-lg border text-sm bg-white dark:bg-gray-900"
                     :class="{
                        'border-green-300 dark:border-green-800 text-green-800 dark:text-green-300': t.type === 'success',
                        'border-red-300 dark:border-red-800 text-red-800 dark:text-red-300': t.type === 'error',
                        'border-gray-200 dark:border-gray-700 text-gray-800 dark:text-gray-200': t.type === 'info'
                     }" role="status">
                    <svg x-show="t.type === 'success'" class="w-4 h-4 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    <svg x-show="t.type === 'error'" class="w-4 h-4 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    <span class="flex-1" x-text="t.message"></span>
                    <button @click="dismissToast(t.id)" class="shrink-0 text-current opacity-60 hover:opacity-100 cursor-pointer" aria-label="Dismiss notification">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
            </template>
        </div>

    </div>
</body>
</html>
